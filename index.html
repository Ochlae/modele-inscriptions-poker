<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Application Poker Club</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: radial-gradient(circle at center, #1f4d1f, #071807);
    color: white;
}
.container {
    max-width: 620px;
    margin: auto;
    padding: 14px;
}
.logo {
    width: 120px;
    display: block;
    margin: 10px auto;
}
h1 {
    text-align: center;
    color: gold;
}
.card {
    background: rgba(0,0,0,0.5);
    border-radius: 15px;
    padding: 15px;
    margin: 10px 0;
}
input, button, select {
    width: 100%;
    padding: 12px;
    margin: 5px 0;
    border-radius: 8px;
    border: none;
}
.inscrire { background: green; color:white;}
.desinscrire { background: red; color:white;}
.admin { background: #444; color:white;}
#compteur {
    text-align:center;
    font-size:20px;
    margin:10px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<h1 id="titreClub"></h1>

<div id="compteur">Connexion...</div>

<div class="card">
<input id="nom" placeholder="Pseudo">
<button class="inscrire" onclick="inscrire()">Inscrire</button>
</div>

<div class="card">
<select id="selectDesinscrire"></select>
<button class="desinscrire" onclick="desinscrire()">Désinscrire</button>
</div>

<div class="card">
<div id="liste"></div>
<div id="attente"></div>
</div>

<div class="card">
<input type="password" id="adminCode" placeholder="Code admin">
<input type="number" id="nbPlaces" placeholder="Nombre de places">
<button class="admin" onclick="changerPlaces()">Modifier places</button>
<button class="admin" onclick="resetTournoi()">Reset tournoi</button>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
// ===== CONFIG CLUB =====

const NOM_CLUB = "NOM DU CLUB";
const BASE_JOUEURS = "joueurs_modele";
const BASE_CONFIG = "config_modele";
const MEMOIRE_LOCALE = "mesJoueursModele";
const CODE_ADMIN = "admin2026";

// ===== FIREBASE =====

const firebaseConfig = {
  apiKey: "AIzaSyDANUdOf2ui5gfuvdOMPfOX_SVaEcoT7-8",
  authDomain: "pexiora-poker-inscriptrions.firebaseapp.com",
  databaseURL: "https://pexiora-poker-inscriptrions-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "pexiora-poker-inscriptrions"
};

firebase.initializeApp(firebaseConfig);

const ref = firebase.database().ref(BASE_JOUEURS);
const configRef = firebase.database().ref(BASE_CONFIG);

let joueurs = [];
let places = 64;

document.getElementById("titreClub").innerText = NOM_CLUB;

ref.on("value", snap => {
    joueurs = snap.val() || [];
    afficher();
});

configRef.on("value", snap => {
    let data = snap.val();
    if (data && data.places) places = data.places;
    afficher();
});

function inscrire() {
    let nom = document.getElementById("nom").value;
    if (!nom) return;

    joueurs.push(nom);
    ref.set(joueurs);

    document.getElementById("nom").value = "";
}

function desinscrire() {
    let pseudo = document.getElementById("selectDesinscrire").value;
    joueurs = joueurs.filter(j => j !== pseudo);
    ref.set(joueurs);
}

function changerPlaces() {
    let code = document.getElementById("adminCode").value;
    if (code !== CODE_ADMIN) return alert("Code incorrect");

    let nb = parseInt(document.getElementById("nbPlaces").value);
    configRef.set({ places: nb });
}

function resetTournoi() {
    let code = document.getElementById("adminCode").value;
    if (code !== CODE_ADMIN) return alert("Code incorrect");

    ref.set([]);
}

function afficher() {
    let ins = joueurs.slice(0, places);
    let att = joueurs.slice(places);

    document.getElementById("compteur").innerText =
        ins.length + " / " + places;

    document.getElementById("liste").innerHTML =
        ins.map((j,i)=> (i+1)+". "+j).join("<br>");

    document.getElementById("attente").innerHTML =
        att.map((j,i)=> (i+1)+". "+j).join("<br>");

    document.getElementById("selectDesinscrire").innerHTML =
        joueurs.map(j=>`<option>${j}</option>`).join("");
}
</script>

</body>
</html>
